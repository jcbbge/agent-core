# stack.yaml — Declared intent for Josh's agent stack
# This is what SHOULD exist. SurrealDB stack/catalog stores observed state.
# Edit this file to add/remove stack components. Run `core deploy` to sync.
# git diff stack.yaml = changelog

meta:
  owner: jcbbge
  machine: macbook-m-series-8gb
  last_updated: "2026-03-11"
  surreal_version: "3.0.2"

ports:
  8000: "executor daemon (active) — label: dev.brain.executor"
  8001: "ollama"
  8002: "surrealdb"
  3099: "kotadb-mcp"
  3098: "anima-mcp"
  3097: "dev-brain-mcp"
  3096: "subagent-mcp (active) — label: dev.brain.subagent-mcp"

orchestrator:
  name: executor
  label: dev.brain.executor
  port: 8000
  role: universal primitive orchestrator
  lifecycle_manager:
    enabled: true
    on_demand_tiers:
      - T2
    auto_trigger:
      enabled: true
      strategy: keyword_fast_path
  intent_classifier:
    enabled: true
    fast_path:
      - pattern: "search|symbol|semantic|dependency|ast|code intelligence"
        target: kotadb
      - pattern: "delegate|review|test|architect|debug"
        target: subagent-mcp
    llm_fallback: true
  tiers:
    T1:
      description: "Always-on core infrastructure"
      services:
        - anima
        - dev-brain
        - executor
        - surreal
        - ollama
      policy: never_stop
    T2:
      description: "On-demand intelligence services"
      services:
        - kotadb
        - subagent-mcp
      triggers: keyword_intent
      startup_delay_ms: 500
      idle_shutdown_minutes: 30
    T3:
      description: "Project-scoped ephemeral services"
      services:
        - HubSpotDev
      lifecycle: project_bound

platform:
  - name: surrealdb
    label: dev.brain.surreal
    binary: ~/bin/surreal
    port: 8002
    namespaces:
      - anima/memory
      - dev/brain
      - kotadb/index
      - stack/catalog
    notes: "Unified single-node instance. All services share one SurrealDB."

  - name: ollama
    label: dev.ollama
    port: 8001
    models:
      - nomic-embed-text
      - qwen2.5:0.5b
    notes: "Homebrew install. nomic-embed-text for kotadb embeddings. qwen2.5:0.5b for synthesis worker."

runtime:
  - name: executor
    label: dev.brain.executor
    port: 8000
    transport: http
    runtime: node (npm global)
    path: ~/executor/
    binary: /opt/homebrew/bin/executor
    mcp_endpoint: http://127.0.0.1:8000/mcp
    harnesses: [claude-code, opencode, omp]
    tool_count: 2
    always_on: true
    sources:
      - dev-brain (3097)
      - anima (3098)
      - kotadb (3099)
    notes: "Universal primitive runtime. TypeScript execution sandbox + unified MCP tool catalog. Fork at ~/executor."

intelligence:
  - name: anima
    label: com.jcbbge.anima-mcp
    port: 3098
    transport: http
    runtime: deno
    path: ~/anima/
    harnesses: [all]
    tool_count: 7
    always_on: true
    notes: "Personal identity and memory layer. Singleton — never shared."

  - name: kotadb
    label: com.jcbbge.kotadb-app
    port: 3099
    transport: http
    runtime: bun
    path: ~/kotadb/
    harnesses: [claude-code, opencode]
    tool_count: 20
    always_on: true
    notes: "Code intelligence MCP. Forked to strip SQLite, uses SurrealDB. Schema initialized on startup."

  - name: dev-brain
    label: com.jcbbge.dev-brain-mcp
    port: 3097
    transport: http
    runtime: bun
    path: ~/dev-backbone/mcp-server/
    harnesses: [claude-code, opencode]
    tool_count: 18
    always_on: true
    notes: "Dev state, todos, thought stream, active threads. HTTP transport (converted from stdio)."

  - name: subagent-mcp
    label: dev.brain.subagent-mcp
    port: 3096
    transport: http
    runtime: bun
    path: ~/dev-backbone/subagent-mcp/
    harnesses: [executor]
    tool_count: 2
    always_on: true
    agents: [reviewer, test-writer, architect, debugger, sigil-distiller]
    notes: "Delegates to subagents via Anthropic API. Definitions at primitives/subagents/. Requires ANTHROPIC_API_KEY in plist."

workers:
  - name: anima-synthesis
    label: anima.synthesis
    path: ~/anima/synthesis-worker/index.ts
    runtime: deno
    trigger: daemon
    provider: ollama
    model: qwen2.5:0.5b
    notes: "LIVE query on memories table. Synthesis triggers on CREATE. Groq deprecated — local Ollama only."

  - name: anima-synthesis-daemon
    label: dev.anima.synthesis-daemon
    path: ~/anima/scripts/synthesis-daemon.ts
    runtime: deno
    trigger: daemon
    provider: openrouter
    notes: "LIVE query on fold_config. Fires when phi_watermark event sets pending_synthesis. Key loaded from .env."

  - name: anima-curiosity-worker
    label: dev.anima.curiosity-worker
    path: ~/anima/scripts/curiosity-worker.ts
    runtime: deno
    trigger: daemon
    interval: 30min
    provider: openrouter
    notes: "Autonomous thought generation. Queries hungry curiosity_threads every 30min. Generates LLM insights into active tier."

  - name: brain-ejection
    label: dev.brain.ejection
    notes: "Blueprints from expired thoughts."

  - name: mem-monitor
    label: com.jcbbge.mem_monitor
    notes: "Memory monitor daemon."

  - name: opencode-sync
    label: com.jcbbge.opencode-sync
    notes: "OpenCode sync daemon."

integrations:
  - name: rtk
    type: hook
    event: PreToolUse
    harnesses: [claude-code]
    hook_script: ~/.claude/hooks/rtk-wrapper.sh
    install: "brew install rtk-ai/tap/rtk"
    version: "0.27.2"
    excludes: [curl, rg, grep, playwright]
    telemetry: disabled
    notes: "Wrapper pattern: rtk-wrapper.sh handles exclusions, calls unmodified rtk-rewrite.sh."

  - name: colgrep
    type: plugin
    harnesses: [claude-code, opencode]
    install: "colgrep --install-claude-code && colgrep --install-opencode"
    notes: "PLAID/ColBERT semantic code search. Plugin for claude-code, AGENTS.md injection for opencode."

scripts:
  - name: rtk-wrapper
    path: ~/.claude/hooks/rtk-wrapper.sh
    purpose: "Exclusion layer before rtk-rewrite.sh. Owns exclusion logic so rtk-rewrite.sh stays unmodified."
    owned_by: agent-core

  - name: surreal-health
    path: ~/.claude/hooks/surreal-health.sh
    purpose: "SessionStart health check for SurrealDB."
    owned_by: agent-core

  - name: core-chain
    path: ~/.claude/hooks/core-chain.sh
    purpose: "SessionStart core infrastructure health check."
    owned_by: agent-core

  - name: capture-prompt
    path: ~/.claude/hooks/capture-prompt.sh
    purpose: "UserPromptSubmit — writes prompt to dev-brain."
    owned_by: agent-core

  - name: capture-interaction
    path: ~/anima/hooks/capture-interaction.sh
    purpose: "UserPromptSubmit — writes interaction to anima."
    owned_by: anima

harnesses:
  - name: claude-code
    status: active
    config: ~/.claude/
    primitives: [skills, commands, rules, hooks, mcp, plugins]

  - name: opencode
    status: active
    config: ~/.config/opencode/
    primitives: [skills, commands, mcp, agents-md]

  - name: augment
    status: installed
    primitives: [skills]

  - name: goose
    status: installed
    primitives: [skills]

  - name: continue
    status: installed
    primitives: [skills]

  - name: gemini-cli
    status: installed
    primitives: [skills]

  - name: cagent
    status: installed
    primitives: [skills]

  - name: droid-factory
    status: installed
    primitives: [skills]

roadmap:
  - sem: "Entity-level semantic diff tool. To integrate as kotadb subprocess for diff MCP tool."
  - team-anima: "Net-new tool for shared team memory. Different design from personal anima. Build when team grows."
  - windows-support: "All hooks are macOS/launchd-specific. Deferred — requires ground-up hook rewrite."
